name: Deploy to Production

on:
  push:
    branches:
      - main
  workflow_dispatch:

# Prevent overlapping deploys (very important for production)
concurrency:
  group: production-deploy
  cancel-in-progress: false

jobs:
  deploy:
    name: Deploy via SSH
    runs-on: ubuntu-latest
    timeout-minutes: 20

    permissions:
      contents: read

    env:
      APP_DIR: /home/kipsreality/kipsrealityweb

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Validate required secrets
        shell: bash
        run: |
          set -euo pipefail
          test -n "${{ secrets.SSH_PRIVATE_KEY }}"
          test -n "${{ secrets.SERVER_HOST }}"
          test -n "${{ secrets.SERVER_USER }}"

      - name: Set up SSH key and known_hosts
        shell: bash
        run: |
          set -euo pipefail
          mkdir -p ~/.ssh
          chmod 700 ~/.ssh

          # Write private key safely
          printf '%s\n' "${{ secrets.SSH_PRIVATE_KEY }}" > ~/.ssh/id_rsa
          chmod 600 ~/.ssh/id_rsa

          # Pin host key (preferred: store exact line in secret SSH_KNOWN_HOSTS)
          if [ -n "${{ secrets.SSH_KNOWN_HOSTS }}" ]; then
            printf '%s\n' "${{ secrets.SSH_KNOWN_HOSTS }}" > ~/.ssh/known_hosts
          else
            echo "SSH_KNOWN_HOSTS secret not set. Falling back to ssh-keyscan..."
            ssh-keyscan -H "${{ secrets.SERVER_HOST }}" >> ~/.ssh/known_hosts 2>/dev/null
          fi
          chmod 644 ~/.ssh/known_hosts

      - name: Test SSH connectivity
        shell: bash
        env:
          SERVER_HOST: ${{ secrets.SERVER_HOST }}
          SERVER_USER: ${{ secrets.SERVER_USER }}
        run: |
          set -euo pipefail
          ssh -i ~/.ssh/id_rsa \
            -o BatchMode=yes \
            -o ConnectTimeout=15 \
            "${SERVER_USER}@${SERVER_HOST}" \
            "echo 'SSH connection OK'"

      - name: Deploy to server
        shell: bash
        env:
          SERVER_HOST: ${{ secrets.SERVER_HOST }}
          SERVER_USER: ${{ secrets.SERVER_USER }}
          GITHUB_SHA: ${{ github.sha }}
          GITHUB_REF_NAME: ${{ github.ref_name }}
        run: |
          set -euo pipefail

          echo "Connecting to ${SERVER_USER}@${SERVER_HOST}..."
          echo "Deploying commit ${GITHUB_SHA} from branch ${GITHUB_REF_NAME}"

          ssh -i ~/.ssh/id_rsa \
            -o BatchMode=yes \
            -o ConnectTimeout=20 \
            "${SERVER_USER}@${SERVER_HOST}" << EOF
            set -euo pipefail

            APP_DIR="${APP_DIR}"
            REPO_URL="https://github.com/${{ github.repository }}.git"
            TARGET_BRANCH="${GITHUB_REF_NAME}"
            TARGET_COMMIT="${GITHUB_SHA}"

            echo "==> Server: \$(hostname)"
            echo "==> App dir: \$APP_DIR"

            if [ ! -d "\$APP_DIR" ]; then
              echo "ERROR: App directory not found: \$APP_DIR"
              exit 1
            fi

            cd "\$APP_DIR"

            # Safety check: ensure this is a git repo
            if [ ! -d .git ]; then
              echo "ERROR: \$APP_DIR is not a git repository"
              exit 1
            fi

            # Optional: ensure remote matches expected repo (warning only)
            CURRENT_REMOTE=\$(git remote get-url origin || true)
            echo "==> Current origin: \$CURRENT_REMOTE"

            echo "==> Fetching latest code..."
            git fetch --prune origin

            echo "==> Resetting to exact commit: \$TARGET_COMMIT"
            git checkout -f "\$TARGET_BRANCH"
            git reset --hard "\$TARGET_COMMIT"

            echo "==> Running deploy script..."
            chmod +x deploy.sh
            ./deploy.sh

            echo "==> Deployment completed successfully"
          EOF

      - name: Deployment summary
        if: success()
        run: |
          echo "✅ Production deploy succeeded"
          echo "Repository: ${{ github.repository }}"
          echo "Branch: ${{ github.ref_name }}"
          echo "Commit: ${{ github.sha }}"
