name: Playwright Tests

on:
  push:
    branches: [main, master]
  pull_request:
    branches: [main, master]

concurrency:
  group: playwright-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  test:
    name: E2E (Playwright + MySQL)
    runs-on: ubuntu-latest
    timeout-minutes: 60

    services:
      mysql:
        image: mysql:8.0
        env:
          MYSQL_DATABASE: rentflow360_test
          MYSQL_USER: testuser
          MYSQL_PASSWORD: testpass
          MYSQL_ROOT_PASSWORD: rootpass
        ports:
          - 3306:3306
        options: >-
          --health-cmd="mysqladmin ping -h 127.0.0.1 -uroot -prootpass --silent"
          --health-interval=10s
          --health-timeout=5s
          --health-retries=30

    env:
      CI: "true"
      NODE_ENV: "test"

      DB_HOST: "127.0.0.1"
      DB_PORT: "3306"
      DATABASE_URL: mysql://testuser:testpass@127.0.0.1:3306/rentflow360_test?connect_timeout=60

      NEXTAUTH_URL: "http://localhost:3000"
      NEXT_PUBLIC_API_URL: "http://localhost:3000"
      NEXT_PUBLIC_BASE_URL: "http://localhost:3000"

      JWT_SECRET: "ci-jwt-secret-secure-enough"
      JWT_REFRESH_SECRET: "ci-refresh-secret-secure-enough"
      NEXTAUTH_SECRET: "ci-nextauth-secret-secure-enough"
      AUTH_SECRET: "ci-auth-secret-secure-enough"
      NEXTAUTH_TRUST_HOST: "true"

      NPM_CONFIG_REGISTRY: "https://registry.npmjs.org/"

      # Set to "true" when you want the full E2E suite to run
      RUN_E2E: "false"

    defaults:
      run:
        shell: bash

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          registry-url: "https://registry.npmjs.org/"

      - name: Show Node/npm + key tool versions
        run: |
          node -v
          npm -v
          npm config get registry
          npx prisma -v || true

      - name: Install dependencies
        run: npm ci --ignore-scripts

      - name: Install MySQL client (for mysqladmin/mysql)
        run: sudo apt-get update && sudo apt-get install -y mysql-client

      - name: Wait for MySQL (service health + TCP)
        run: |
          echo "Using MySQL on ${DB_HOST}:${DB_PORT}"
          for i in {1..45}; do
            if mysqladmin ping -h "${DB_HOST}" -P "${DB_PORT}" -uroot -prootpass --silent >/dev/null 2>&1; then
              echo "MySQL is reachable."
              exit 0
            fi
            echo "Waiting for MySQL... ($i/45)"
            sleep 2
          done
          echo "MySQL not reachable in time."
          exit 1

      - name: DB smoke test (auth + database exists)
        run: |
          mysql -h "${DB_HOST}" -P "${DB_PORT}" -u testuser -ptestpass -e "SELECT 1;" rentflow360_test
          echo "DB smoke test passed."

      - name: Create .env.test and .env
        run: |
          cat > .env.test <<EOF
          NODE_ENV=test
          DATABASE_URL=${DATABASE_URL}
          NEXTAUTH_URL=${NEXTAUTH_URL}
          NEXT_PUBLIC_API_URL=${NEXT_PUBLIC_API_URL}
          NEXT_PUBLIC_BASE_URL=${NEXT_PUBLIC_BASE_URL}
          JWT_SECRET=${JWT_SECRET}
          JWT_REFRESH_SECRET=${JWT_REFRESH_SECRET}
          NEXTAUTH_SECRET=${NEXTAUTH_SECRET}
          AUTH_SECRET=${AUTH_SECRET}
          NEXTAUTH_TRUST_HOST=${NEXTAUTH_TRUST_HOST}
          EOF

          cp .env.test .env
          echo ".env.test created"

      - name: Validate Prisma schema
        run: npx prisma validate

      - name: Generate Prisma Client
        run: npx prisma generate

      - name: Reset schema and seed E2E DB
        run: |
          echo "Syncing schema..."
          npx prisma db push --force-reset --accept-data-loss
          echo "Seeding..."
          npx --yes tsx prisma/seed.e2e.ts

      - name: Cache Playwright browsers
        if: env.RUN_E2E == 'true'
        uses: actions/cache@v4
        with:
          path: |
            ~/.cache/ms-playwright
          key: ${{ runner.os }}-playwright-${{ hashFiles('package-lock.json') }}

      - name: Build app
        if: env.RUN_E2E == 'true'
        run: npm run build

      - name: Install Playwright browsers
        if: env.RUN_E2E == 'true'
        run: npx playwright install --with-deps

      - name: Run Playwright tests
        if: env.RUN_E2E == 'true'
        run: npx playwright test --project=chromium --reporter=line

      - name: Upload Playwright report
        if: always() && env.RUN_E2E == 'true'
        uses: actions/upload-artifact@v4
        with:
          name: playwright-report
          path: playwright-report/
          retention-days: 7
          if-no-files-found: warn

      - name: Upload traces/screenshots/videos
        if: always() && env.RUN_E2E == 'true'
        uses: actions/upload-artifact@v4
        with:
          name: playwright-test-results
          path: test-results/
          retention-days: 7
          if-no-files-found: warn
