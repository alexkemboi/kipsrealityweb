name: Playwright Tests

on:
  push:
    branches: [main, master, reset-main-branch, fix/schema-definations]
  pull_request:
    branches: [main, master, reset-main-branch, fix/schema-definations]

jobs:
  test:
    runs-on: ubuntu-latest
    timeout-minutes: 60

    services:
      mysql:
        image: mysql:8.0
        env:
          MYSQL_DATABASE: rentflow360_test
          MYSQL_USER: testuser
          MYSQL_PASSWORD: testpass
          MYSQL_ROOT_PASSWORD: rootpass
        ports:
          - 3306:3306
        options: >-
          --health-cmd="mysqladmin ping -h 127.0.0.1 -uroot -prootpass --silent"
          --health-interval=10s
          --health-timeout=5s
          --health-retries=20

    env:
      CI: "true"
      NODE_ENV: "test"
      DATABASE_URL: "mysql://testuser:testpass@127.0.0.1:3306/rentflow360_test?connect_timeout=60"

      NEXTAUTH_URL: "http://localhost:3000"
      NEXT_PUBLIC_API_URL: "http://localhost:3000"
      NEXT_PUBLIC_BASE_URL: "http://localhost:3000"

      JWT_SECRET: "ci-jwt-secret-secure-enough"
      JWT_REFRESH_SECRET: "ci-refresh-secret-secure-enough"
      NEXTAUTH_SECRET: "ci-nextauth-secret-secure-enough"
      AUTH_SECRET: "ci-auth-secret-secure-enough"
      NEXTAUTH_TRUST_HOST: "true"

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Wait for MySQL
        shell: bash
        run: |
          for i in {1..30}; do
            if nc -z 127.0.0.1 3306; then
              echo "MySQL is reachable."
              exit 0
            fi
            echo "Waiting for MySQL... ($i/30)"
            sleep 2
          done
          echo "MySQL not reachable."
          exit 1

      - name: Create .env.test
        run: |
          cat > .env.test <<EOF
          NODE_ENV=test
          DATABASE_URL=${DATABASE_URL}
          NEXTAUTH_URL=${NEXTAUTH_URL}
          NEXT_PUBLIC_API_URL=${NEXT_PUBLIC_API_URL}
          NEXT_PUBLIC_BASE_URL=${NEXT_PUBLIC_BASE_URL}
          JWT_SECRET=${JWT_SECRET}
          JWT_REFRESH_SECRET=${JWT_REFRESH_SECRET}
          NEXTAUTH_SECRET=${NEXTAUTH_SECRET}
          AUTH_SECRET=${AUTH_SECRET}
          NEXTAUTH_TRUST_HOST=${NEXTAUTH_TRUST_HOST}
          EOF
          cp .env.test .env

      - name: Generate Prisma Client
        run: npx prisma generate

      - name: Reset schema and seed E2E DB
        run: |
          echo "Syncing schema..."
          npx prisma db push --force-reset --accept-data-loss
          echo "Seeding..."
          npx tsx prisma/seed.e2e.ts

      - name: Install Playwright browsers
        run: npx playwright install --with-deps chromium # Only install Chromium to speed up CI

      - name: Run Playwright tests
        run: npx playwright test --project=chromium --reporter=line

      - name: Upload Playwright report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-report
          path: playwright-report/
          retention-days: 7

      - name: Upload traces/screenshots/videos
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-test-results
          path: test-results/
          retention-days: 7